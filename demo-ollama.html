<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>本機 Ollama 大腦 — 試玩</title>
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;min-height:100vh;
       display:grid;place-items:center;background:linear-gradient(135deg,#eef1ff,#f7f8ff);color:#222033}
  .card{max-width:560px;padding:32px;text-align:center}
  h1{font-size:22px;margin:0 0 12px}
  p{color:#556;line-height:1.8;margin:8px 0}
  code{background:#fff;padding:2px 7px;border-radius:6px;font-size:13px}
  .note{font-size:13px;color:#8890a6;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <h1>🧠 本機 Ollama 大腦 — 試玩頁</h1>
    <p>右下角的虛擬人現在用你電腦上的 <code>qwen2.5</code>（Ollama，跑在 GPU）當大腦。</p>
    <p>點右下角的 <strong>🎤 說話</strong> 或直接打字問她試試看。<br>🧠 按鈕顯示「本機」＝已接上本機大腦。</p>
    <p class="note">※ 這頁只在你本機跑得動（Ollama 是本機服務）。公開部署不會通。</p>
  </div>

  <!-- 一行嵌入：把大腦指到本機 Ollama 的 OpenAI 相容端點 -->
  <script src="embed.js"
          data-ollama="http://localhost:11434/v1"
          data-llmmodel="qwen2.5:latest"
          data-open="true"></script>
</body>
</html>
