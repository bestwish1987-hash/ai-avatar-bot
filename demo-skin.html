<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>換皮試玩：mao_pro（來自 Open-LLM-VTuber）</title>
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;min-height:100vh;
       display:grid;place-items:center;background:linear-gradient(135deg,#eef1ff,#f7f8ff);color:#222033}
  .card{max-width:560px;padding:32px;text-align:center}
  h1{font-size:21px;margin:0 0 12px}
  p{color:#556;line-height:1.8;margin:8px 0}
  code{background:#fff;padding:2px 7px;border-radius:6px;font-size:13px}
  .note{font-size:13px;color:#8890a6;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <h1>🎭 換皮試玩：<code>mao_pro</code>（來自 Open-LLM-VTuber）</h1>
    <p>右下角虛擬人現在的「皮」是從 OLV 搬過來的 <code>mao_pro</code> Live2D 角色。</p>
    <p><strong>大腦維持預設（知識庫模式）</strong>，要接哪顆大腦由你自己決定。</p>
    <p class="note">想換成另一個皮 <code>shizuku</code>：把下面 <code>data-model</code> 改成
      <code>models/shizuku/shizuku.model3.json</code> 即可。</p>
  </div>

  <!-- 只換皮：data-model 指向搬進來的 OLV 模型；不設 data-ollama → 大腦保持預設、由使用者自行更新 -->
  <script src="embed.js"
          data-model="models/mao_pro/mao_pro.model3.json"
          data-open="true"></script>
</body>
</html>
