<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2D / 3D 雙皮切換 Demo</title>
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;min-height:100vh;
       display:grid;place-items:center;background:linear-gradient(135deg,#eef1ff,#f7f8ff);color:#222033}
  .card{max-width:560px;padding:32px;text-align:center}
  h1{font-size:21px;margin:0 0 12px}
  p{color:#556;line-height:1.8;margin:8px 0}
  code{background:#fff;padding:2px 7px;border-radius:6px;font-size:13px}
  .note{font-size:13px;color:#8890a6;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <h1>🎭 2D / 3D 雙皮切換 Demo</h1>
    <p>右下角虛擬人同時掛了 <b>2D（Live2D haru）</b>＋<b>3D（VRoid VRM）</b>兩個皮，
       控制列會多一顆 <code>2D／3D</code> 切換鈕。</p>
    <p>點那顆鈕切到 <b>3D</b>：<b>點一下角色</b>她會揮手、<b>打字問她</b>講話時會點頭，光影也調暗過了。</p>
    <p class="note">3D 皮指向本機 <code>vroid_a.vrm</code>；換別的 VRM 改 <code>data-vrm</code> 即可。請用 Chrome 桌機。</p>
  </div>

  <!-- 同時掛 2D(data-model) + 3D(data-vrm) → 控制列長出 2D/3D 切換鈕 -->
  <script src="embed.js"
          data-model="https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display/test/assets/haru/haru_greeter_t03.model3.json"
          data-vrm="vroid_a.vrm"
          data-open="true"></script>
</body>
</html>
